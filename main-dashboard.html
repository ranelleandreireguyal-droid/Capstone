<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Main Dashboard</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  height:100vh;
  background:#111827;
  position:fixed;
  padding:20px;
}

.sidebar button {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
  cursor:pointer;
}

/* MAIN */
.main {
  margin-left:240px;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Kasipag</h2>
  <p id="roleText"></p>

  <div id="menu"></div>

  <button onclick="logout()">Logout</button>
</div>

<div class="main">
  <h1>Dashboard</h1>
  <div id="content" class="card">Welcome!</div>
</div>

<script>
const role = localStorage.getItem("role");

// 🔒 PROTECT PAGE
if (!role) {
  window.location.href = "/index.html";
}

document.getElementById("roleText").innerText = "Role: " + role;

const menu = document.getElementById("menu");
const content = document.getElementById("content");

// ROLE-BASED MENU
if (role === "admin") {
  menu.innerHTML = `
    <button onclick="load('users')">Manage Users</button>
    <button onclick="load('reports')">Reports</button>
  `;
}
else if (role === "rider") {
  menu.innerHTML = `
    <button onclick="load('deliveries')">My Deliveries</button>
    <button onclick="load('status')">Update Status</button>
  `;
}
else {
  menu.innerHTML = `
    <button onclick="load('payments')">Payments</button>
    <button onclick="load('history')">History</button>
  `;
}

// CONTENT SWITCH
function load(page) {
  content.innerHTML = "<h3>" + page + "</h3>";
}

// LOGOUT
function logout() {
  localStorage.clear();
  window.location.href = "/index.html";
}
</script>

</body>
</html>
