<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kasipag Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* SIDEBAR */
.sidebar {
  width: 230px;
  height: 100vh;
  background: #111827;
  position: fixed;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* LOGO */
.logo {
  width: 60px;
  height: 60px;
  object-fit: contain;
  background: white;
  padding: 6px;
  border-radius: 12px;
  margin-bottom: 10px;
}
/* BRAND */
.brand {
  font-weight: bold;
  margin-bottom: 20px;
}

/* ROLE TEXT */
#roleText {
  font-size: 14px;
  color: #9ca3af;
  margin-bottom: 10px;
}

/* MENU BUTTONS */
.sidebar button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: none;
  border-radius: 8px;
  background: #1f2937;
  color: white;
  cursor: pointer;
}

.sidebar button:hover {
  background: #374151;
}

/* LOGOUT */
.logout {
  margin-top: auto;
  background: #dc2626 !important;
}

/* MAIN */
.main {
  margin-left: 250px;
  padding: 20px;
}

/* CARD */
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="sidebar">

  <!-- LOGO FIXED -->
  <img src="./picture/logo.png" class="logo" alt="Kasipag Logo">
  <div class="brand">KASIPAG</div>

  <p id="roleText"></p>

  <div id="menu"></div>

  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="main">
  <h1>Dashboard</h1>

  <div id="content" class="card">
    Welcome to Kasipag System
  </div>
</div>

<script>
const role = localStorage.getItem("role");

/* PROTECTION */
if (!role) {
  window.location.href = "/index.html";
}

document.getElementById("roleText").innerText = "Role: " + role;

const menu = document.getElementById("menu");
const content = document.getElementById("content");

/* ROLE BASED MENU */
if (role === "admin") {
  menu.innerHTML = `
    <button onclick="load('Users')">Manage Users</button>
    <button onclick="load('Reports')">Reports</button>
  `;
}
else if (role === "rider") {
  menu.innerHTML = `
    <button onclick="load('Deliveries')">My Deliveries</button>
    <button onclick="load('Status')">Update Status</button>
  `;
}
else {
  menu.innerHTML = `
    <button onclick="load('Payments')">Payments</button>
    <button onclick="load('History')">History</button>
  `;
}

function load(page) {
  content.innerHTML = `
    <h3>${page}</h3>
    <p>Loading ${page} module...</p>
  `;
}

function logout() {
  localStorage.clear();
  window.location.href = "/index.html";
}
</script>

</body>
</html>
