<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasipag Admin (Firebase)</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
  padding: 20px;
}

.header {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 15px;
}

.form {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #22c55e;
  color: white;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">👑 Kasipag Admin Dashboard (Firebase)</div>

<!-- FORM -->
<div class="form">
  <input id="name" placeholder="Customer Name">
  <input id="amount" placeholder="Amount">
  <button onclick="addCustomer()">Add</button>
</div>

<!-- LIST -->
<div id="list"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCbA1nHwbw_yYVI9MtbjZetYZx7_gmw25c",
  authDomain: "kasipag-app.firebaseapp.com",
  projectId: "kasipag-app",
  storageBucket: "kasipag-app.firebasestorage.app",
  messagingSenderId: "442166485005",
  appId: "1:442166485005:web:ed07396b8a59006efa3544",
  measurementId: "G-SJQKE0F3H0"
};

// INIT FIREBASE
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ADD CUSTOMER */
function addCustomer() {
  let name = document.getElementById("name").value;
  let amount = document.getElementById("amount").value;

  if (!name || !amount) {
    alert("Fill all fields");
    return;
  }

  db.collection("payments").add({
    name: name,
    amount: amount,
    assignedTo: "",
    status: "No Payment"
  });

  document.getElementById("name").value = "";
  document.getElementById("amount").value = "";
}

/* REAL-TIME LIST */
db.collection("payments").onSnapshot(snapshot => {
  let list = document.getElementById("list");
  list.innerHTML = "";

  snapshot.forEach(doc => {
    let d = doc.data();

    list.innerHTML += `
      <div class="card">
        <b>${d.name}</b><br>
        ₱${d.amount}<br>
        Rider: ${d.assignedTo || "None"}<br>
        Status: ${d.status}
      </div>
    `;
  });
});
</script>

</body>
</html>
