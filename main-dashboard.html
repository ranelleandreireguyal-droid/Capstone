<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Main Dashboard</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  height:100vh;
  background:#111827;
  position:fixed;
  padding:20px;
}

/* LOGO STYLE */
.logo {
  width:120px;
  height:120px;
  object-fit:contain;
  display:block;
  margin:0 auto 10px auto;
  border-radius:20px;
}

.brand {
  text-align:center;
  font-weight:bold;
  margin-bottom:15px;
}

/* BUTTONS */
.sidebar button {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
  cursor:pointer;
}

.sidebar button:hover {
  background:#374151;
}

/* MAIN */
.main {
  margin-left:240px;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="sidebar">

  <!-- 🔥 LOGO HERE -->
  <img src="picture" class="logo" alt="Kasipag Logo">

  <div class="brand">KASIPAG</div>

  <p id="roleText"></p>

  <div id="menu"></div>

  <button onclick="logout()">Logout</button>
</div>

<div class="main">
  <h1>Dashboard</h1>

  <div id="content" class="card">
    Welcome to Kasipag System
  </div>
</div>

<script>
const role = localStorage.getItem("role");

// protection
if (!role) {
  window.location.href = "/index.html";
}

document.getElementById("roleText").innerText = "Role: " + role;

const menu = document.getElementById("menu");
const content = document.getElementById("content");

// role menus
if (role === "admin") {
  menu.innerHTML = `
    <button onclick="load('users')">Manage Users</button>
    <button onclick="load('reports')">Reports</button>
  `;
}
else if (role === "rider") {
  menu.innerHTML = `
    <button onclick="load('deliveries')">My Deliveries</button>
    <button onclick="load('status')">Update Status</button>
  `;
}
else {
  menu.innerHTML = `
    <button onclick="load('payments')">Payments</button>
    <button onclick="load('history')">History</button>
  `;
}

function load(page) {
  content.innerHTML = "<h3>" + page + "</h3>";
}

function logout() {
  localStorage.clear();
  window.location.href = "/index.html";
}
</script>

</body>
</html>
