<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kasipag System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .box {
      background: #111827;
      padding: 30px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
    }

    button {
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .a { background: #ef4444; color: white; }
    .b { background: #22c55e; color: white; }
    .c { background: #3b82f6; color: white; }
  </style>
</head>

<body>

<div class="box">
  <h2>Kasipag App</h2>
  <p>Select Role</p>

  <button class="a" onclick="selectRole('admin')">Admin</button>
  <button class="b" onclick="selectRole('rider')">Rider</button>
  <button class="c" onclick="selectRole('cashier')">Cashier</button>
</div>

<script>
function selectRole(role) {
  localStorage.setItem("selectedRole", role);
  window.location.href = "./login.html";
}

// auto redirect if logged in
const role = localStorage.getItem("role");

if (role === "admin") window.location.href = "./admin-dashboard.html";
if (role === "rider") window.location.href = "./rider-dashboard.html";
if (role === "cashier") window.location.href = "./cashier-dashboard.html";
</script>

</body>
</html>
