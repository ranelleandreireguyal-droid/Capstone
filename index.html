<!DOCTYPE html>
<html>
<head>
  <title>Kasipag Login</title>
</head>
<body>

<h2>Kasipag Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ✅ YOUR CONFIG (ginamit ko na)
const firebaseConfig = {
  apiKey: "AIzaSyCbA1nHwbw_yYVI9MtbjZetYZx7_gmw25c",
  authDomain: "kasipag-app.firebaseapp.com",
  projectId: "kasipag-app",
  storageBucket: "kasipag-app.firebasestorage.app",
  messagingSenderId: "442166485005",
  appId: "1:442166485005:web:ed07396b8a59006efa3544",
  measurementId: "G-SJQKE0F3H0"
};

// Initialize
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Login function
window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      // 🔥 SIMPLE ROLE SYSTEM
      if (email.includes("admin")) {
        window.location.href = "admin.html";
      } else if (email.includes("rider")) {
        window.location.href = "rider.html";
      } else {
        window.location.href = "cashier.html";
      }
    })
    .catch((error) => {
      alert("Login failed: " + error.message);
    });
};
</script>

</body>
</html>
