<!DOCTYPE html>
<html>
<head>
<title>Kasipag Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#0f172a;
  color:white;
}

.box{
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Kasipag Login</h2>

  <input id="user" placeholder="username">
  <input id="pass" type="password" placeholder="password">

  <button onclick="login()">Login</button>
</div>

<!-- DATA JS -->
<script src="data.js"></script>

<script>
function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  const user = loginUser(u, p);

  if(!user){
    alert("Invalid login");
    return;
  }

  // ROUTING
  if(user.role === "superadmin"){
    window.location.href = "admin.html";
  }
  else if(user.role === "admin"){
    window.location.href = "admin-dashboard.html";
  }
  else if(user.role === "cashier"){
    window.location.href = "cashier.html";
  }
  else if(user.role === "rider"){
    window.location.href = "rider.html";
  }
}
</script>

</body>
</html>
