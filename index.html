<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasipag App</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}
.box {
  background:#111827;
  padding:30px;
  border-radius:15px;
  width:320px;
  text-align:center;
}
.top-square {
  width:120px;
  height:120px;
  margin:0 auto 22px auto;
  background:#38bdf8;
  border-radius:24px;
  box-shadow:0 12px 30px rgba(56,189,248,0.25);
}
button {
  width:100%;
  margin:8px 0;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.a { background:#ef4444; color:white; }
.b { background:#22c55e; color:white; }
.c { background:#3b82f6; color:white; }
</style>
</head>

<body>

<div class="box">
  <div class="top-square"></div>
  <h2>Kasipag App</h2>

  <div class="card">
  <h3>Welcome</h3>
  <img src="/picture/download.png " style="width:120px;margin-top:10px;">


  <button class="a" onclick="go('admin')">Admin</button>
  <button class="b" onclick="go('rider')">Rider</button>
  <button class="c" onclick="go('cashier')">Cashier</button>
</div>

<script>
function go(role){
  localStorage.setItem("selectedRole", role);
  window.location.href = "/login.html";
}
</script>

</body>
</html>
