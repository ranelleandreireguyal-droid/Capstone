<!DOCTYPE html>
<html>
<head>
  <title>Kasipag Login</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      padding: 30px;
      width: 300px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, button {
      padding: 10px;
      margin: 8px;
      width: 90%;
    }

    button {
      background: orange;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>Kasipag Login</h2>

  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  console.log("Email:", email);
  console.log("Password:", password);

  const res = await fetch(`${SUPABASE_URL}/rest/v1/users?email=eq.${email}&password=eq.${password}`, {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    }
  });

  const data = await res.json();

  console.log("Result:", data);

  if (data.length > 0) {
    const role = data[0].role;

    if (role === "admin") window.location.href = "admin.html";
    if (role === "rider") window.location.href = "rider.html";
    if (role === "cashier") window.location.href = "cashier.html";
  } else {
    alert("Invalid login");
  }
}
</script>

</body>
</html>
