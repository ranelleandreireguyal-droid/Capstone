<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rider 3 Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: #f1f5f9;
  padding: 20px;
  min-height: 100vh;
}

.header {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 20px;
  background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.card {
  background: linear-gradient(145deg, #1e293b 0%, #334155 100%);
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.3s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 35px rgba(0,0,0,0.3);
}

.card-info {
  flex: 1;
}

.card-info b {
  font-size: 18px;
  color: #f1f5f9;
  display: block;
  margin-bottom: 8px;
}

.card-info div {
  color: #cbd5e1;
  margin-bottom: 3px;
  font-size: 14px;
}

.status {
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  text-transform: uppercase;
  display: inline-block;
}

.status-pending { background: #facc15; color: #1f2937; }
.status-paid { background: #22c55e; color: white; }
.status-none { background: #64748b; color: white; }

.card-actions {
  display: flex;
  gap: 10px;
  margin-left: 15px;
}

button {
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  transition: all 0.3s ease;
}

.btn-collect {
  background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
  color: white;
}

.btn-collect:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(59,130,246,0.3);
}

.note {
  color: #94a3b8;
  font-size: 13px;
  padding: 10px 14px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
}

.no-data {
  text-align: center;
  color: #94a3b8;
  font-style: italic;
  padding: 40px 20px;
}
.logout {
  display: inline-block;
  margin-top: 20px;
  color: #94a3b8;
  text-decoration: none;
}
.logout:hover {
  color: #f1f5f9;
}
</style>
</head>

<body>

<div class="header">Rider 3 Dashboard</div>
<div class="note">Collect payment from customers, then cashier will confirm the payment as paid.</div>
<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCbA1nHwbw_yYVI9MtbjZetYZx7_gmw25c",
  authDomain: "kasipag-app.firebaseapp.com",
  projectId: "kasipag-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const riderId = "Rider 3";

function markCollected(id) {
  db.collection("payments").doc(id).update({
    status: "Pending"
  });
}

db.collection("payments").onSnapshot(snapshot => {
  let list = document.getElementById("list");
  list.innerHTML = "";
  let hasData = false;

  snapshot.forEach(doc => {
    let d = doc.data();
    if (d.assignedTo !== riderId) return;

    hasData = true;
    let statusClass = d.status === "Paid" ? "status-paid" : d.status === "Pending" ? "status-pending" : "status-none";
    let actionButton = "";
    if (d.status === "Paid") {
      actionButton = `<div class=\"note\">Payment completed</div>`;
    } else if (d.status === "Pending") {
      actionButton = `<div class=\"note\">Collected - waiting cashier approval</div>`;
    } else {
      actionButton = `<button class=\"btn-collect\" onclick=\"markCollected('${doc.id}')\">Mark Collected</button>`;
    }

    list.innerHTML += `
      <div class="card">
        <div class="card-info">
          <b>${d.name}</b>
          <div>Amount: PHP ${Number(d.amount).toLocaleString()}</div>
          <div>Status: <span class="status ${statusClass}">${d.status || 'No Payment'}</span></div>
        </div>
        <div class="card-actions">${actionButton}</div>
      </div>
    `;
  });

  if (!hasData) {
    list.innerHTML = '<div class="no-data">No payments assigned to you yet.</div>';
  }
});
</script>

<a class="logout" href="/index.html" onclick="localStorage.clear()">Logout</a>

</body>
</html>
