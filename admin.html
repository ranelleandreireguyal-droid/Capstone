<!DOCTYPE html>
<html>
<head>
<title>Enterprise Admin</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0}
.container{padding:20px}
.card{background:#1e293b;padding:15px;margin:10px;border-radius:10px}
</style>
</head>

<body>

<div class="container">
  <h1>👑 Super Admin Dashboard</h1>

  <button onclick="logout()">Logout</button>

  <div id="stats"></div>
  <canvas id="chart"></canvas>

  <h2>Loans</h2>
  <div id="loanList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const user = JSON.parse(sessionStorage.getItem("user"));

if(!user || user.role !== "superadmin"){
  location.href="index.html";
}

function logout(){
  sessionStorage.clear();
  location.href="index.html";
}

let loans = JSON.parse(localStorage.getItem("loans") || "[]");

// STATS
function renderStats(){
  const paid = loans.filter(l=>l.status==="paid").length;
  const pending = loans.filter(l=>l.status==="pending").length;
  const overdue = loans.filter(l=>l.status==="overdue").length;

  stats.innerHTML = `
    <div class="card">Paid: ${paid}</div>
    <div class="card">Pending: ${pending}</div>
    <div class="card">Overdue: ${overdue}</div>
  `;

  new Chart(chart, {
    type:"bar",
    data:{
      labels:["Paid","Pending","Overdue"],
      datasets:[{data:[paid,pending,overdue]}]
    }
  });
}

// LOANS
function renderLoans(){
  loanList.innerHTML = loans.map(l=>`
    <div class="card">
      <b>${l.name}</b> - ₱${l.amount}
      <br>Status: ${l.status}
      <br>Rider: ${l.rider || "none"}
    </div>
  `).join("");
}

renderStats();
renderLoans();
</script>

</body>
</html>
