<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cashier Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

button {
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  background: #22c55e;
  cursor: pointer;
}

.pending { color: #facc15; }
.paid { color: #22c55e; }
.none { color: #ef4444; }
</style>
</head>

<body>

<script>
if (localStorage.getItem("role") !== "cashier") {
  window.location.href = "/index.html";
}

/* LOAD SHARED DATA */
let customers = JSON.parse(localStorage.getItem("payments")) || [];

/* SAVE */
function save() {
  localStorage.setItem("payments", JSON.stringify(customers));
}

/* CONFIRM PAYMENT */
function confirmPay(i) {
  customers[i].status = "Paid";
  save();
  render();
}

/* RENDER */
function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  customers.forEach((c, i) => {

    let color = "none";
    if (c.status === "Pending") color = "pending";
    if (c.status === "Paid") color = "paid";

    list.innerHTML += `
      <div class="card">
        <div>
          <strong>${c.name}</strong><br>
          <span class="${color}">${c.status}</span>
        </div>

        <div>
          ${c.status === "Pending" ? `
            <button onclick="confirmPay(${i})">Confirm Payment</button>
          ` : ""}
        </div>
      </div>
    `;
  });
}

render();
</script>

<h1>Cashier Dashboard</h1>

<div id="list"></div>

<a href="/index.html" onclick="localStorage.clear()">Logout</a>

</body>
</html>
