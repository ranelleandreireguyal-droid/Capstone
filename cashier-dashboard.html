<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cashier Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: #f1f5f9;
  padding: 20px;
  min-height: 100vh;
}

.header {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 20px;
  background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.note {
  margin-bottom: 20px;
  color: #94a3b8;
  font-size: 14px;
}

.card {
  background: linear-gradient(145deg, #1e293b 0%, #334155 100%);
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.3s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 35px rgba(0,0,0,0.3);
}

.card-info {
  flex: 1;
}

.card-info b {
  font-size: 18px;
  color: #f1f5f9;
  display: block;
  margin-bottom: 8px;
}

.card-info div {
  color: #cbd5e1;
  margin-bottom: 4px;
  font-size: 14px;
}

.status {
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  text-transform: uppercase;
  display: inline-block;
}

.status-pending { background: #facc15; color: #1f2937; }
.status-paid { background: #22c55e; color: white; }

.card-actions {
  display: flex;
  gap: 10px;
  margin-left: 15px;
}

button {
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  transition: all 0.3s ease;
}

.btn-confirm {
  background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  color: white;
}

.btn-confirm:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(34,197,94,0.3);
}

.no-data {
  text-align: center;
  color: #94a3b8;
  font-style: italic;
  padding: 40px 20px;
}

.logout {
  display: inline-block;
  margin-top: 20px;
  color: #94a3b8;
  text-decoration: none;
}

.logout:hover {
  color: #f1f5f9;
}
</style>
</head>

<body>

<div class="header">Cashier Dashboard</div>
<div class="note">Pending payments collected by riders appear here. Confirm them as paid once cash is received.</div>
<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
if (localStorage.getItem("role") !== "cashier") {
  window.location.href = "/index.html";
}

const firebaseConfig = {
  apiKey: "AIzaSyCbA1nHwbw_yYVI9MtbjZetYZx7_gmw25c",
  authDomain: "kasipag-app.firebaseapp.com",
  projectId: "kasipag-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function confirmPaid(id) {
  db.collection("payments").doc(id).update({
    status: "Paid"
  });
}

function renderList(snapshot) {
  let list = document.getElementById("list");
  list.innerHTML = "";
  let hasData = false;

  snapshot.forEach(doc => {
    let d = doc.data();
    if (d.status !== "Pending") return;
    hasData = true;

    list.innerHTML += `
      <div class="card">
        <div class="card-info">
          <b>${d.name}</b>
          <div>Amount: PHP ${Number(d.amount).toLocaleString()}</div>
          <div>Rider: ${d.assignedTo || 'Not assigned'}</div>
          <div>Status: <span class="status status-pending">Pending</span></div>
        </div>
        <div class="card-actions">
          <button class="btn-confirm" onclick="confirmPaid('${doc.id}')">Confirm Paid</button>
        </div>
      </div>
    `;
  });

  if (!hasData) {
    list.innerHTML = '<div class="no-data">No rider-collected payments are pending confirmation.</div>';
  }
}

db.collection("payments").orderBy("createdAt", "desc").onSnapshot(snapshot => {
  renderList(snapshot);
});
</script>

<a class="logout" href="/index.html" onclick="localStorage.clear()">Logout</a>

</body>
</html>
