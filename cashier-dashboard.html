<h2>Cashier</h2>

<div id="list"></div>

<script src="db.js"></script>

<script>
let loans = JSON.parse(localStorage.getItem("loans"));

function pay(id){
  updateLoan(id,{status:"paid"});
  location.reload();
}

list.innerHTML = loans.map(l=>`
  <div class="card">
    ${l.name} - ₱${l.amount} (${l.status})
    <button onclick="pay(${l.id})">Mark Paid</button>
  </div>
`).join("");
</script>
