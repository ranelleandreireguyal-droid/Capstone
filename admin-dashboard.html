<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

input, select, button {
  padding: 6px;
  border-radius: 6px;
  border: none;
}

button {
  cursor: pointer;
}
</style>
</head>

<body>

<script>
if (localStorage.getItem("role") !== "admin") {
  window.location.href = "/index.html";
}

/* ALWAYS LOAD LATEST DATA */
function getData() {
  return JSON.parse(localStorage.getItem("payments")) || [];
}

/* SAVE DATA */
function saveData(data) {
  localStorage.setItem("payments", JSON.stringify(data));
}

/* ADD CUSTOMER */
function addCustomer() {
  let name = document.getElementById("name").value;
  let amount = document.getElementById("amount").value;

  if (!name || !amount) return alert("Fill all fields");

  let data = getData();

  data.push({
    name: name,
    amount: amount,
    assignedTo: "",
    status: "No Payment"
  });

  saveData(data);
  render();
}

/* ASSIGN RIDER */
function assignRider(index, rider) {
  let data = getData();
  data[index].assignedTo = rider;
  saveData(data);
  render();
}

/* DELETE */
function removeCustomer(index) {
  let data = getData();
  data.splice(index, 1);
  saveData(data);
  render();
}

/* RENDER */
function render() {
  let data = getData();
  let list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((c, i) => {
    list.innerHTML += `
      <div class="card">
        <div>
          <strong>${c.name}</strong><br>
          ₱${c.amount}<br>
          Assigned: ${c.assignedTo || "None"}<br>
          Status: ${c.status}
        </div>

        <div>
          <select onchange="assignRider(${i}, this.value)">
            <option value="">Assign Rider</option>
            <option value="rider1">Rider 1</option>
            <option value="rider2">Rider 2</option>
          </select>

          <br><br>

          <button onclick="removeCustomer(${i})" style="background:red;color:white;">
            Delete
          </button>
        </div>
      </div>
    `;
  });
}

render();
</script>

<h1>Admin Dashboard</h1>

<div class="card">
  <div>
    <input id="name" placeholder="Customer Name"><br>
    <input id="amount" placeholder="Amount">
  </div>

  <button onclick="addCustomer()" style="background:#22c55e;">
    Add Customer
  </button>
</div>

<div id="list"></div>

<a href="/index.html" onclick="localStorage.clear()">Logout</a>

</body>
</html>
