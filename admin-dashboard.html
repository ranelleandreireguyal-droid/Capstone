<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasipag Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
  background-attachment: fixed;
  color: #f1f5f9;
  padding: 20px;
  min-height: 100vh;
  position: relative;
}

body::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image:
    radial-gradient(circle at 20% 80%, rgba(120,119,198,0.05) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(255,119,198,0.05) 0%, transparent 50%),
    radial-gradient(circle at 40% 40%, rgba(120,219,226,0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: -1;
}

.header {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 25px;
  text-align: center;
  background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 50%, #cbd5e1 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  position: relative;
}

.header button {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(239,68,68,0.3);
}

.header button:hover {
  transform: translateY(-50%) scale(1.05);
  box-shadow: 0 6px 20px rgba(239,68,68,0.4);
}

.note {
  color: #cbd5e1;
  margin-bottom: 20px;
  font-size: 16px;
  text-align: center;
  font-weight: 400;
}

.form {
  background: linear-gradient(145deg, rgba(30,41,59,0.95) 0%, rgba(51,65,85,0.95) 100%);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 25px;
  border-radius: 18px;
  display: flex;
  gap: 15px;
  align-items: center;
  margin-bottom: 35px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

input {
  padding: 14px 18px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.15);
  outline: none;
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 16px;
  flex: 1;
  min-width: 200px;
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
}

input::placeholder {
  color: #94a3b8;
}

input:focus {
  background: rgba(255,255,255,0.12);
  border-color: rgba(59,130,246,0.6);
  box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
  transform: translateY(-1px);
}

button {
  padding: 14px 20px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  color: white;
  font-weight: 600;
  font-size: 16px;
  transition: all 0.3s ease;
  box-shadow: 0 6px 20px rgba(34,197,94,0.3);
  backdrop-filter: blur(10px);
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(34,197,94,0.4);
}
}

input::placeholder {
  color: #94a3b8;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  color: white;
  font-weight: 600;
  font-size: 16px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(34,197,94,0.3);
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(34,197,94,0.4);
}

.note {
  color: #cbd5e1;
  margin-bottom: 15px;
  font-size: 14px;
  text-align: center;
}

.summary {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 20px;
  margin-bottom: 35px;
  animation: fadeInUp 0.8s ease-out 0.2s both;
}

.summary-card {
  background: linear-gradient(145deg, rgba(30,41,59,0.9) 0%, rgba(51,65,85,0.9) 100%);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 24px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.summary-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, #3b82f6, #8b5cf6, #06b6d4);
}

.summary-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 35px rgba(0,0,0,0.3);
}

.summary-card strong {
  display: block;
  font-size: 28px;
  margin-bottom: 8px;
  color: #f1f5f9;
  font-weight: 700;
}

.summary-card div {
  color: #94a3b8;
  font-size: 14px;
  font-weight: 500;
}

.card {
  background: linear-gradient(145deg, rgba(30,41,59,0.95) 0%, rgba(51,65,85,0.95) 100%);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  padding: 24px;
  margin-bottom: 18px;
  border-radius: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  transition: all 0.3s ease;
  animation: fadeInUp 0.6s ease-out;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.2);
}

.card-info {
  flex: 1;
}

.card-info strong {
  font-size: 20px;
  color: #f1f5f9;
  display: block;
  margin-bottom: 6px;
  font-weight: 600;
}

.card-info div {
  color: #cbd5e1;
  margin-bottom: 4px;
  font-size: 14px;
}

.card-info div {
  color: #cbd5e1;
  margin-bottom: 3px;
  font-size: 14px;
}

.status {
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.status-pending { background: linear-gradient(135deg, #facc15, #eab308); color: #1f2937; }
.status-paid { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
.status-none { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }

.card-actions {
  display: flex;
  gap: 12px;
  align-items: center;
}

select {
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 14px;
  outline: none;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}

select:focus {
  background: rgba(255,255,255,0.12);
  border-color: rgba(59,130,246,0.6);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}

select option {
  background: #1e293b;
  color: white;
}

.delete-btn {
  padding: 10px 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
  color: white;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(239,68,68,0.3);
  backdrop-filter: blur(10px);
}

.delete-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(239,68,68,0.4);
}

.no-data {
  text-align: center;
  color: #94a3b8;
  font-style: italic;
  margin-top: 60px;
  font-size: 18px;
  padding: 40px;
  background: rgba(255,255,255,0.02);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div class="header">👑 Kasipag Admin Dashboard <button onclick="logout()" style="float:right; background:#ef4444; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Logout</button></div>
<div class="note">Assign payments to riders here. All assignments and pending collections are visible to riders and the cashier in real time.</div>
<div class="summary">
  <div class="summary-card">
    <strong id="totalCount">0</strong>
    <div>Total Records</div>
  </div>
  <div class="summary-card">
    <strong id="assignedCount">0</strong>
    <div>Assigned to Riders</div>
  </div>
  <div class="summary-card">
    <strong id="pendingCount">0</strong>
    <div>Pending Cashier</div>
  </div>
  <div class="summary-card">
    <strong id="paidCount">0</strong>
    <div>Paid</div>
  </div>
</div>

<!-- FORM -->
<div class="form">
  <input id="name" placeholder="Customer Name" required>
  <input id="amount" placeholder="Loan Amount (₱)" type="number" min="0" required>
  <button onclick="addCustomer()">Add Customer</button>
</div>

<!-- LIST -->
<div id="list"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCbA1nHwbw_yYVI9MtbjZetYZx7_gmw25c",
  authDomain: "kasipag-app.firebaseapp.com",
  projectId: "kasipag-app",
  storageBucket: "kasipag-app.firebasestorage.app",
  messagingSenderId: "442166485005",
  appId: "1:442166485005:web:ed07396b8a59006efa3544",
  measurementId: "G-SJQKE0F3H0"
};

if (localStorage.getItem("role") !== "admin") {
  window.location.href = "/index.html";
}

// INIT FIREBASE
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function logout() {
  localStorage.clear();
  window.location.href = "/index.html";
}

/* ADD CUSTOMER */
function addCustomer() {
  let name = document.getElementById("name").value.trim();
  let amount = parseFloat(document.getElementById("amount").value);

  if (!name || isNaN(amount) || amount <= 0) {
    alert("Please enter valid customer name and amount");
    return;
  }

  db.collection("payments").add({
    name: name,
    amount: amount,
    assignedTo: "",
    status: "New",
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("name").value = "";
  document.getElementById("amount").value = "";
}

/* ASSIGN RIDER */
function assignRider(docId, rider) {
  db.collection("payments").doc(docId).update({
    assignedTo: rider
  });
}

/* DELETE PAYMENT */
function deletePayment(docId) {
  if (confirm("Are you sure you want to delete this payment?")) {
    db.collection("payments").doc(docId).delete();
  }
}

function updateSummary(total, assigned, pending, paid) {
  document.getElementById("totalCount").textContent = total;
  document.getElementById("assignedCount").textContent = assigned;
  document.getElementById("pendingCount").textContent = pending;
  document.getElementById("paidCount").textContent = paid;
}

/* REAL-TIME LIST */
db.collection("payments").orderBy("createdAt", "desc").onSnapshot(snapshot => {
  let list = document.getElementById("list");
  list.innerHTML = "";

  let total = 0;
  let assigned = 0;
  let pending = 0;
  let paid = 0;

  if (snapshot.empty) {
    list.innerHTML = '<div class="no-data">No payments found. Add a customer to get started.</div>';
    updateSummary(0, 0, 0, 0);
    return;
  }

  snapshot.forEach(doc => {
    total += 1;
    let d = doc.data();
    if (d.assignedTo) assigned += 1;
    if (d.status === "Pending") pending += 1;
    if (d.status === "Paid") paid += 1;
    let docId = doc.id;

    let statusClass = "status-none";
    if (d.status === "Pending") statusClass = "status-pending";
    if (d.status === "Paid") statusClass = "status-paid";

    list.innerHTML += `
      <div class="card">
        <div class="card-info">
          <strong>${d.name}</strong>
          <div>Amount: ₱${d.amount.toLocaleString()}</div>
          <div>Rider Assigned: ${d.assignedTo || "Not Assigned"}</div>
          <div>Status: <span class="status ${statusClass}">${d.status}</span></div>
        </div>
        <div class="card-actions">
          <select onchange="assignRider('${docId}', this.value)">
            <option value="">Assign Rider</option>
            <option value="Rider 1" ${d.assignedTo === "Rider 1" ? "selected" : ""}>Rider 1</option>
            <option value="Rider 2" ${d.assignedTo === "Rider 2" ? "selected" : ""}>Rider 2</option>
            <option value="Rider 3" ${d.assignedTo === "Rider 3" ? "selected" : ""}>Rider 3</option>
          </select>
          <button class="delete-btn" onclick="deletePayment('${docId}')">Delete</button>
        </div>
      </div>
    `;
  });

  updateSummary(total, assigned, pending, paid);
});
</script>

</body>
</html>
