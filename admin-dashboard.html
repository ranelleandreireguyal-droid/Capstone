<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasipag Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing:border-box; }

body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#020617;
  height:100vh;
  padding:20px;
}

.sidebar h2 {
  color:#38bdf8;
}

.sidebar button {
  width:100%;
  margin-top:20px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.home-btn { background:#3b82f6; color:white; }
.logout-btn { background:#ef4444; color:white; }

/* MAIN */
.main {
  flex:1;
  padding:30px;
}

/* HEADER */
.header {
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

/* FORM */
.form {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

.form select, .form input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

/* CARD */
.card {
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
}

/* STATUS */
.status {
  padding:5px 10px;
  border-radius:6px;
}

.pending { background:orange; }
.paid { background:green; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Kasipag</h2>
  <button class="home-btn" onclick="goHome()">🏠 Home</button>
  <button class="logout-btn" onclick="logout()">🚪 Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">👑 Admin Dashboard</div>

<!-- FORM -->
<div class="form">

  <label>Type</label>
  <select id="type" onchange="toggleGroup()">
    <option value="single">Single Borrower</option>
    <option value="group">Group Loan</option>
  </select>

  <div id="singleBox">
    <input id="name" placeholder="Customer Name">
  </div>

  <div id="groupBox" style="display:none;">
    <input id="groupNames" placeholder="Enter names (comma separated)">
  </div>

  <input id="amount" type="number" placeholder="Amount">

  <button onclick="addCustomer()">Add</button>

</div>

<!-- LIST -->
<div id="list"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// ROLE PROTECT
if(localStorage.getItem("role") !== "admin"){
  window.location.href="index.html";
}

// NAV
function logout(){
  localStorage.clear();
  window.location.href="index.html";
}
function goHome(){
  window.location.href="index.html";
}

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCb...",
  authDomain: "kasipag-app.firebaseapp.com",
  projectId: "kasipag-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// TOGGLE GROUP
function toggleGroup(){
  let type = document.getElementById("type").value;

  document.getElementById("singleBox").style.display = type==="single" ? "block":"none";
  document.getElementById("groupBox").style.display = type==="group" ? "block":"none";
}

// ADD
function addCustomer(){
  let type = document.getElementById("type").value;
  let amount = parseFloat(document.getElementById("amount").value);

  let names = [];

  if(type==="single"){
    let name = document.getElementById("name").value.trim();
    if(!name) return alert("Enter name");
    names.push(name);
  } else {
    let group = document.getElementById("groupNames").value.trim();
    if(!group) return alert("Enter group names");
    names = group.split(",");
  }

  db.collection("payments").add({
    names:names,
    type:type,
    amount:amount,
    status:"Pending",
    assignedTo:""
  });
}

// DISPLAY
db.collection("payments").onSnapshot(snap=>{
  let list = document.getElementById("list");
  list.innerHTML="";

  snap.forEach(doc=>{
    let d = doc.data();

    list.innerHTML += `
    <div class="card">
      <div>
        <strong>${d.type==="group" ? "Group" : "Single"}</strong><br>
        Names: ${d.names.join(", ")}<br>
        ₱${d.amount}
      </div>

      <div>
        <span class="status ${d.status==="Paid"?"paid":"pending"}">${d.status}</span><br><br>

        <button onclick="markPaid('${doc.id}')">Mark Paid</button>
        <button onclick="deleteData('${doc.id}')">Delete</button>
      </div>
    </div>
    `;
  });
});

// ACTIONS
function markPaid(id){
  db.collection("payments").doc(id).update({status:"Paid"});
}

function deleteData(id){
  db.collection("payments").doc(id).delete();
}
</script>

</body>
</html>
