<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Super Admin</title>

<style>
body {
  margin:0;
  font-family:Arial;
  display:flex;
  background:#0f172a;
  color:white;
}

/* SIDEBAR */
.sidebar {
  width:230px;
  background:#020617;
  padding:20px;
}

.sidebar h2 { color:#38bdf8; }

.sidebar button {
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.main {
  flex:1;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>👑 Super Admin</h2>

  <button onclick="show('users')">👥 Users</button>
  <button onclick="show('loans')">💰 Loans</button>
  <button onclick="logout()">🚪 Logout</button>
</div>

<div class="main">
  <h1 id="title">Dashboard</h1>
  <div id="content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
if(localStorage.getItem("role") !== "superadmin"){
  window.location.href="index.html";
}

const firebaseConfig = {
  apiKey: "AIzaSyCb...",
  authDomain: "kasipag-app.firebaseapp.com",
  projectId: "kasipag-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function logout(){
  localStorage.clear();
  window.location.href="index.html";
}

/* SWITCH VIEW */
function show(type){
  let c = document.getElementById("content");

  if(type==="users"){
    document.getElementById("title").innerText="User Management";

    c.innerHTML = `
      <input id="user" placeholder="username">
      <input id="pass" placeholder="password">
      <select id="role">
        <option value="admin">Admin</option>
        <option value="cashier">Cashier</option>
        <option value="rider">Rider</option>
      </select>
      <button onclick="addUser()">Add User</button>
      <div id="userList"></div>
    `;

    loadUsers();
  }

  if(type==="loans"){
    document.getElementById("title").innerText="All Loans";

    db.collection("payments").onSnapshot(snap=>{
      c.innerHTML="";
      snap.forEach(doc=>{
        let d = doc.data();
        c.innerHTML += `<div class="card">
          ${d.names.join(", ")} - ₱${d.amount}
        </div>`;
      });
    });
  }
}

/* ADD USER */
function addUser(){
  db.collection("users").add({
    username: user.value,
    password: pass.value,
    role: role.value
  });
}

/* LOAD USERS */
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    let list = document.getElementById("userList");
    list.innerHTML="";
    snap.forEach(doc=>{
      let d = doc.data();
      list.innerHTML += `<div class="card">
        ${d.username} (${d.role})
      </div>`;
    });
  });
}
</script>

</body>
</html>
