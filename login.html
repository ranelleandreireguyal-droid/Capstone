<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasipag Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box{
  background:#111827;
  padding:40px;
  border-radius:15px;
  width:350px;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}
</style>
</head>

<body>

<div class="box">
  <h2>Kasipag Login</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
// 👑 OFFLINE ACCOUNTS
const accounts = {
  admin: {
    password: "admin123",
    role: "admin"
  },
  superadmin: {
    password: "super123",
    role: "superadmin"
  },
  cashier: {
    password: "cash123",
    role: "cashier"
  },
  rider: {
    password: "rider123",
    role: "rider"
  }
};

function login(){
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();

  if(!u || !p){
    alert("Fill all fields");
    return;
  }

  if(accounts[u] && accounts[u].password === p){

    localStorage.setItem("role", accounts[u].role);

    // 🚀 ROUTING
    if(accounts[u].role === "superadmin"){
      window.location.href = "super-admin.html";
    }
    else if(accounts[u].role === "admin"){
      window.location.href = "admin-dashboard.html";
    }
    else if(accounts[u].role === "cashier"){
      window.location.href = "cashier-dashboard.html";
    }
    else if(accounts[u].role === "rider"){
      window.location.href = "rider-dashboard.html";
    }

  } else {
    alert("Invalid login");
  }
}
</script>

</body>
</html>
