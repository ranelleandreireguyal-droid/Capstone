<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #111827;
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <p id="roleText"></p>

  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
const role = localStorage.getItem("selectedRole");
document.getElementById("roleText").innerText = "Role: " + role;

function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if (!user || !pass) {
    alert("Fill all fields");
    return;
  }

  // SAVE ROLE AFTER LOGIN
  localStorage.setItem("role", role);

  // FIXED SAFE ROUTING
  const routes = {
    admin: "./admin-dashboard.html",
    rider: "./rider-dashboard.html",
    cashier: "./cashier-dashboard.html"
  };

  window.location.href = routes[role] || "./index.html";
}
</script>

</body>
</html>
