<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasipag Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', Arial, sans-serif;
  background:linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #f1f5f9 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:#fff;
  padding:50px;
  border-radius:20px;
  width:400px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.15);
}

h2 { margin-bottom:10px; }

.subtitle {
  font-size:14px;
  color:#64748b;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #cbd5e1;
  outline:none;
}

input:focus {
  border-color:#3b82f6;
}

button {
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:hover {
  background:#2563eb;
}

a {
  display:block;
  margin-top:15px;
  color:#3b82f6;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔐 Kasipag Login</h2>
  <div class="subtitle">Microfinance System Access</div>

  <!-- 👑 PRE-FILLED SUPERADMIN -->
  <input id="username" placeholder="Username / Email" value="superadmin@kasipag.com">
  <input id="password" type="password" placeholder="Password" value="super123">

  <button onclick="login()">Login</button>

  <a href="index.html">← Back to Home</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCbA1nHwbw_yYVI9MtbjZetYZx7_gmw25c",
  authDomain: "kasipag-app.firebaseapp.com",
  projectId: "kasipag-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function login() {
  const input = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();

  if (!input || !pass) {
    alert("Fill all fields");
    return;
  }

  db.collection("users")
    .where("password", "==", pass)
    .get()
    .then(snapshot => {

      let user = null;

      snapshot.forEach(doc => {
        let d = doc.data();
        if (d.username === input || d.email === input) {
          user = d;
        }
      });

      if (!user) {
        alert("Invalid login");
        return;
      }

      localStorage.setItem("role", user.role);

      if (user.role === "superadmin") {
        window.location.href = "super-admin.html";
      } else if (user.role === "admin") {
        window.location.href = "admin-dashboard.html";
      } else if (user.role === "cashier") {
        window.location.href = "cashier-dashboard.html";
      } else if (user.role === "rider") {
        window.location.href = "rider-dashboard.html";
      }

    });
}
</script>

</body>
</html>
