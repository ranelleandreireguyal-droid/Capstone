<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasipag Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', Arial, sans-serif;
  background:linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#f1f5f9;
  overflow:hidden;
}

.box {
  background:linear-gradient(145deg, #1e293b 0%, #334155 100%);
  padding:40px;
  border-radius:20px;
  width:380px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
  position:relative;
  animation:slideIn 0.6s ease-out;
}

@keyframes slideIn {
  from { opacity:0; transform:translateY(-30px); }
  to { opacity:1; transform:translateY(0); }
}

.logo-icon {
  width:80px;
  height:80px;
  margin:0 auto 25px;
  background:linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  box-shadow:0 10px 30px rgba(59,130,246,0.3);
}

h2 {
  font-size:28px;
  font-weight:700;
  margin-bottom:8px;
  background:linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.subtitle {
  font-size:14px;
  color:#94a3b8;
  margin-bottom:25px;
}

input {
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:#f1f5f9;
  font-size:16px;
  outline:none;
  transition:all 0.3s ease;
  box-sizing:border-box;
}

input::placeholder {
  color:#64748b;
}

input:focus {
  background:rgba(255,255,255,0.08);
  border-color:rgba(59,130,246,0.5);
  box-shadow:0 0 0 3px rgba(59,130,246,0.1);
}

button {
  width:100%;
  padding:14px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
  color:white;
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  transition:all 0.3s ease;
  box-shadow:0 8px 25px rgba(59,130,246,0.3);
  position:relative;
  overflow:hidden;
}

button::before {
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition:left 0.5s;
}

button:hover::before {
  left:100%;
}

button:hover {
  transform:translateY(-2px);
  box-shadow:0 12px 35px rgba(59,130,246,0.4);
}

button:active {
  transform:translateY(0);
}

.footer-text {
  font-size:12px;
  color:#64748b;
  margin-top:25px;
}
</style>
</head>

<body>

<div class="box">
  <div class="logo-icon">🔐</div>
  <h2>Kasipag Login</h2>
  <div class="subtitle">Access your microfinancing dashboard</div>

  <input id="username" placeholder="Username" autocomplete="username">
  <input id="password" type="password" placeholder="Password" autocomplete="current-password">

  <button onclick="login()">Login</button>
  
  <div class="footer-text">Demo: admin / admin123</div>
</div>

<script>
const accounts = {
  admin:   { user: "admin",   pass: "admin123" },

  rider1:  { user: "rider1",  pass: "rider123" },
  rider2:  { user: "rider2",  pass: "rider123" },
  rider3:  { user: "rider3",  pass: "rider123" },

  cashier: { user: "cashier", pass: "cash123" }
};

function login() {
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();

  let foundRole = null;

  // 🔥 AUTO DETECT ROLE BASED ON CREDENTIALS
  for (const role in accounts) {
    if (accounts[role].user === u && accounts[role].pass === p) {
      foundRole = role;
      break;
    }
  }

  if (!foundRole) {
    alert("Invalid username or password");
    return;
  }

  localStorage.setItem("role", foundRole);
  localStorage.setItem("currentUser", foundRole);

  // 🚀 ROUTING FIX
  if (foundRole === "admin") {
    window.location.href = "/admin-dashboard.html";
  }

  else if (foundRole === "rider1") {
    window.location.href = "/rider1-dashboard.html";
  }

  else if (foundRole === "rider2") {
    window.location.href = "/rider2-dashboard.html";
  }

  else if (foundRole === "rider3") {
    window.location.href = "/rider3-dashboard.html";
  }

  else if (foundRole === "cashier") {
    window.location.href = "/cashier-dashboard.html";
  }
}

// Allow Enter key to submit
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById("password").addEventListener("keypress", function(e) {
    if (e.key === "Enter") login();
  });
});
</script>

</body>
</html>
