<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasipag Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', Arial, sans-serif;
  background:linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #f1f5f9 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  color:#1e293b;
  position:relative;
}

/* background glow */
body::before {
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 80%, rgba(59,130,246,0.15), transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(168,85,247,0.15), transparent 50%);
  pointer-events:none;
}

.box {
  background:rgba(255,255,255,0.95);
  padding:50px;
  border-radius:25px;
  width:400px;
  text-align:center;
  box-shadow:0 25px 80px rgba(0,0,0,0.15);
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(-30px);}
  to {opacity:1; transform:translateY(0);}
}

.logo {
  font-size:45px;
  margin-bottom:10px;
}

h2 {
  margin:10px 0;
  font-size:28px;
}

.subtitle {
  font-size:14px;
  color:#64748b;
  margin-bottom:25px;
}

input {
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #cbd5e1;
  outline:none;
  font-size:15px;
  transition:0.3s;
}

input:focus {
  border-color:#3b82f6;
  box-shadow:0 0 0 3px rgba(59,130,246,0.2);
}

button {
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg, #3b82f6, #2563eb);
  color:white;
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(59,130,246,0.3);
}

.back {
  margin-top:15px;
  font-size:14px;
}

.back a {
  color:#3b82f6;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="box">
  <div class="logo">🔐</div>
  <h2>Kasipag Login</h2>
  <div class="subtitle">Microfinance Access Portal</div>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="back">
    <a href="index.html">← Back to Home</a>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCbA1nHwbw_yYVI9MtbjZetYZx7_gmw25c",
  authDomain: "kasipag-app.firebaseapp.com",
  projectId: "kasipag-app",
  storageBucket: "kasipag-app.appspot.com",
  messagingSenderId: "442166485005",
  appId: "1:442166485005:web:ed07396b8a59006efa3544"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔐 LOGIN SYSTEM (SUPER ADMIN READY)
function login() {
  const u = username.value.trim();
  const p = password.value.trim();

  if (!u || !p) {
    alert("Please fill in all fields");
    return;
  }

  db.collection("users")
    .where("username", "==", u)
    .where("password", "==", p)
    .get()
    .then(snap => {

      if (snap.empty) {
        alert("Invalid username or password");
        return;
      }

      let user = snap.docs[0].data();

      localStorage.setItem("role", user.role);
      localStorage.setItem("username", user.username);

      // 🚀 ROLE ROUTING (NO SLASH)
      if (user.role === "superadmin") {
        window.location.href = "super-admin.html";
      }

      else if (user.role === "admin") {
        window.location.href = "admin-dashboard.html";
      }

      else if (user.role === "cashier") {
        window.location.href = "cashier-dashboard.html";
      }

      else if (user.role === "rider") {
        window.location.href = "rider-dashboard.html";
      }

    })
    .catch(err => {
      console.error(err);
      alert("Database error");
    });
}

// ENTER KEY SUPPORT
document.addEventListener("keydown", function(e){
  if(e.key === "Enter") login();
});
</script>

</body>
</html>
