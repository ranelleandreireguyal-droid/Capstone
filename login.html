<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box {
  background:#111827;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
// get selected role from previous page
const selectedRole = localStorage.getItem("selectedRole");

// ONE ACCOUNT PER ROLE
const accounts = {
  admin:   { user: "admin",   pass: "admin123" },
  rider:   { user: "rider",   pass: "rider123" },
  cashier: { user: "cashier", pass: "cash123" }
};

function login() {
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();

  // check if role exists
  if (!selectedRole || !accounts[selectedRole]) {
    alert("No role selected. Please go back.");
    window.location.href = "/index.html";
    return;
  }

  const acc = accounts[selectedRole];

  // validate login
  if (u === acc.user && p === acc.pass) {
    localStorage.setItem("role", selectedRole);

    // ROLE DASHBOARD REDIRECT
    switch (selectedRole) {
      case "admin":
        window.location.href = "/admin-dashboard.html";
        break;

      case "rider":
        window.location.href = "/rider-dashboard.html";
        break;

      case "cashier":
        window.location.href = "/cashier-dashboard.html";
        break;

      default:
        alert("Invalid role");
    }

  } else {
    alert("Invalid username or password for " + selectedRole);
  }
}
</script>

</body>
</html>
