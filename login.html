<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .box {
      background: #111827;
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input id="u" placeholder="username">
  <input id="p" type="password" placeholder="password">

  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  const role = localStorage.getItem("selectedRole");

  if (!role) {
    window.location.href = "/index.html";
    return;
  }

  localStorage.setItem("role", role);

  // SAFE ROUTING (NO ./, NO ERROR)
  if (role === "admin") {
    window.location.href = "/admin-dashboard.html";
  }
  else if (role === "rider") {
    window.location.href = "/rider-dashboard.html";
  }
  else {
    window.location.href = "/cashier-dashboard.html";
  }
}
</script>

</body>
</html>
