<script>
const selectedRole = localStorage.getItem("selectedRole");

// ONE ACCOUNT PER ROLE
const accounts = {
  admin:   { user: "admin",   pass: "admin123" },
  rider:   { user: "rider",   pass: "rider123" },
  cashier: { user: "cashier", pass: "cash123" }
};

function login(){
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();

  if (!selectedRole) {
    alert("No role selected. Please go back to role selection.");
    window.location.href = "/index.html";
    return;
  }

  const acc = accounts[selectedRole];

  if (!acc) {
    alert("Invalid role.");
    return;
  }

  if (u === acc.user && p === acc.pass) {
    localStorage.setItem("role", selectedRole);

    // 🔥 ROLE-BASED REDIRECT (SEPARATE DASHBOARDS)
    if (selectedRole === "admin") {
      window.location.href = "/admin-dashboard.html";
    } 
    else if (selectedRole === "rider") {
      window.location.href = "/rider-dashboard.html";
    } 
    else if (selectedRole === "cashier") {
      window.location.href = "/cashier-dashboard.html";
    }

  } else {
    alert("Invalid credentials for " + selectedRole);
  }
}
</script>
