<script>
const accounts = {
  admin:   { user: "admin",   pass: "admin123" },

  rider1:  { user: "rider1",  pass: "rider123" },
  rider2:  { user: "rider2",  pass: "rider123" },
  rider3:  { user: "rider3",  pass: "rider123" },

  cashier: { user: "cashier", pass: "cash123" }
};

function login() {
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();

  // 🔥 GET ROLE SAFELY
  const selectedRole = localStorage.getItem("selectedRole");

  if (!selectedRole) {
    alert("Walang selected role. Balik ka muna sa role selection page.");
    window.location.href = "/index.html";
    return;
  }

  const acc = accounts[selectedRole];

  if (!acc) {
    alert("Invalid role: " + selectedRole);
    return;
  }

  if (u === acc.user && p === acc.pass) {

    localStorage.setItem("role", selectedRole);
    localStorage.setItem("currentUser", selectedRole);

    if (selectedRole === "admin") {
      window.location.href = "/admin-dashboard.html";
    }

    else if (selectedRole.startsWith("rider")) {
      window.location.href = "/rider-dashboard.html";
    }

    else if (selectedRole === "cashier") {
      window.location.href = "/cashier-dashboard.html";
    }

  } else {
    alert("Invalid username or password for " + selectedRole);
  }
}
</script>
