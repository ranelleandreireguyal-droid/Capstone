<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: #111827;
      padding: 30px;
      border-radius: 16px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .role {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Login</h2>

    <div class="role" id="roleText"></div>

    <input type="text" placeholder="Username" id="username">
    <input type="password" placeholder="Password" id="password">

    <button onclick="login()">Login</button>
  </div>

  <script>
    const role = localStorage.getItem("selectedRole");
    document.getElementById("roleText").innerText = "Role: " + role;

    function login() {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;

      if (!user || !pass) {
        alert("Fill all fields");
        return;
      }

      // SIMPLE DEMO LOGIN (no database yet)
      localStorage.setItem("role", role);

      if (role === "admin") {
        window.location.href = "admin-dashboard.html";
      } else if (role === "rider") {
        window.location.href = "rider-dashboard.html";
      } else {
        window.location.href = "cashier-dashboard.html";
      }
    }
  </script>

</body>
</html>
