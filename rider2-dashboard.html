<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rider 2 Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  color: #f1f5f9;
  padding: 20px;
  min-height: 100vh;
}

.header {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 20px;
  background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  margin-bottom: 25px;
}

.stat-box {
  background: linear-gradient(145deg, #1e293b 0%, #334155 100%);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.08);
}

.stat-number {
  font-size: 32px;
  font-weight: 700;
  color: #3b82f6;
  margin-bottom: 5px;
}

.stat-label {
  font-size: 14px;
  color: #94a3b8;
}

.card {
  background: linear-gradient(145deg, #1e293b 0%, #334155 100%);
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.3s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 35px rgba(0,0,0,0.3);
}

.card-info {
  flex: 1;
}

.card-info b {
  font-size: 18px;
  color: #f1f5f9;
  display: block;
  margin-bottom: 8px;
}

.card-info div {
  color: #cbd5e1;
  margin-bottom: 3px;
  font-size: 14px;
}

.status {
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  text-transform: uppercase;
  display: inline-block;
}

.status-pending {
  background: #facc15;
  color: #1f2937;
}

.status-paid {
  background: #22c55e;
  color: white;
}

.card-actions {
  display: flex;
  gap: 10px;
  margin-left: 15px;
}

button {
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  transition: all 0.3s ease;
}

.btn-pending {
  background: linear-gradient(135deg, #facc15 0%, #eab308 100%);
  color: #1f2937;
}

.btn-pending:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(250,204,21,0.3);
}

.btn-paid {
  background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  color: white;
}

.btn-paid:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(34,197,94,0.3);
}

.no-data {
  text-align: center;
  color: #94a3b8;
  font-style: italic;
  padding: 40px 20px;
}
</style>
</head>

<body>

<div class="header">🚴 Rider 2 Dashboard</div>

<div class="stats">
  <div class="stat-box">
    <div class="stat-number" id="totalCount">0</div>
    <div class="stat-label">Assigned</div>
  </div>
  <div class="stat-box">
    <div class="stat-number" id="pendingCount">0</div>
    <div class="stat-label">Pending</div>
  </div>
  <div class="stat-box">
    <div class="stat-number" id="paidCount">0</div>
    <div class="stat-label">Completed</div>
  </div>
</div>

<div id="list"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCbA1nHwbw_yYVI9MtbjZetYZx7_gmw25c",
  authDomain: "kasipag-app.firebaseapp.com",
  projectId: "kasipag-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const riderId = "Rider 2";

function updateStatus(id, status) {
  db.collection("payments").doc(id).update({
    status: status
  });
}

db.collection("payments").onSnapshot(snapshot => {
  let list = document.getElementById("list");
  list.innerHTML = "";

  let total = 0;
  let pending = 0;
  let paid = 0;
  let hasData = false;

  snapshot.forEach(doc => {
    let d = doc.data();

    if (d.assignedTo !== riderId) return;

    hasData = true;
    total++;
    
    if (d.status === "Pending") pending++;
    if (d.status === "Paid") paid++;

    let statusClass = d.status === "Paid" ? "status-paid" : "status-pending";
    let buttonClass = d.status === "Paid" ? "btn-pending" : "btn-paid";
    let buttonText = d.status === "Paid" ? "Set Pending" : "Mark Paid";
    let buttonStatus = d.status === "Paid" ? "Pending" : "Paid";

    list.innerHTML += `
      <div class="card">
        <div class="card-info">
          <b>${d.name}</b>
          <div>Amount: ₱${d.amount.toLocaleString()}</div>
          <div>Status: <span class="status ${statusClass}">${d.status}</span></div>
        </div>
        <div class="card-actions">
          <button class="${buttonClass}" onclick="updateStatus('${doc.id}', '${buttonStatus}')">
            ${buttonText}
          </button>
        </div>
      </div>
    `;
  });

  document.getElementById("totalCount").textContent = total;
  document.getElementById("pendingCount").textContent = pending;
  document.getElementById("paidCount").textContent = paid;

  if (!hasData) {
    list.innerHTML = '<div class="no-data">No payments assigned to you yet</div>';
  }
});
</script>

</body>
</html><!DOCTYPE html>
<html>
<head>

<body>

<h2>🚴 Rider Dashboard</h2>

<div id="list"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCbA1nHwbw_yYVI9MtbjZetYZx7_gmw25c",
  authDomain: "kasipag-app.firebaseapp.com",
  projectId: "kasipag-app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 🔥 SET RIDER ACCOUNT HERE */
const riderId = "rider1"; 
// change to "rider2" or "rider3" per account

/* UPDATE STATUS */
function updateStatus(id, status) {
  db.collection("payments").doc(id).update({
    status: status
  });
}

/* REALTIME + FILTERED DATA */
db.collection("payments").onSnapshot(snapshot => {
  let list = document.getElementById("list");
  list.innerHTML = "";

  snapshot.forEach(doc => {
    let d = doc.dsata();

    // 🔥 FILTER: ONLY ASSIGNED TO THIS RIDER
    if (d.assignedTo !== riderId) return;

    let color = d.status === "Paid" ? "paid" : "pending";

    list.innerHTML += `
      <div class="card">
        <b>${d.name}</b><br>
        ₱${d.amount}<br>
        Status: <span class="${color}">${d.status}</span><br><br>

        <button onclick="updateStatus('${doc.id}', 'Pending')" style="background:#facc15;">
          Set Pending
        </button>

        <button onclick="updateStatus('${doc.id}', 'Paid')" style="background:#22c55e;">
          Mark Paid
        </button>
      </div>
    `;
  });
});
</script>

</body>
</html>
