<h2>Rider Panel</h2>

<div id="list"></div>

<script src="db.js"></script>
<script src="auth.js"></script>

<script>
const user = getUser();
const loans = getLoansByRole("rider", user);

list.innerHTML = loans.map(l=>`
  <div class="card">
    ${l.name} - ₱${l.amount}
    <br>Status: ${l.status}
  </div>
`).join("");
</script>
